<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Toma de Datos Biométricos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<header class="header">
    <div class="header-content">

        <div class="header-left">
            <img src="{{ url_for('static', filename='img/logou.png') }}" 
                 alt="Logo Universidad" 
                 class="logo">

            <div class="header-text">
                <h1>Sistema De Toma De Datos Biométricos</h1>
                <p class="subtitulo">
                    Biblioteca Universidad Libre Seccional Bogotá
                </p>
            </div>
        </div>

        <a href="{{ url_for('registro') }}" class="btn-registrarse">
            Registrarse
        </a>

    </div>
</header>

<main class="container">

    <a href="{{ url_for('obtener') }}" class="card">
        <div class="icon red">🔒</div>
        <div>
            <h2>Obtener Locker</h2>
            <p>Coloca tu huella para recibir un locker asignado</p>
        </div>
    </a>

    <a href="{{ url_for('liberar') }}" class="card">
        <div class="icon gray">🔓</div>
        <div>
            <h2>Liberar Locker</h2>
            <p>Coloca tu huella para recuperar tus pertenencias</p>
        </div>
    </a>

</main>

<footer>
    Sistema automático • Seguro y privado
</footer>

</body>
</html>
